jwt.secret=yourStrongSecretKey123456789
jwt.expiration=86400000
server.port=8090
# Use cloud/local Mongo via env var MONGO_URI (preferred), fallback to local.
spring.data.mongodb.uri=${MONGO_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smart-campus-hub?connectTimeoutMS=2000&serverSelectionTimeoutMS=2000}}
management.health.mongo.enabled=false

# Mail settings
# Set app.mail.enabled=true to send real emails.
# When false (default): registration auto-verifies email (no OTP step) for assignment/demo.
app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
